<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sigma - Mapeamento de Perfil</title>
    <meta name="description" content="Sistema Sigma de Mapeamento de Perfil">
    
    <link rel="icon" href="https://fonts.gstatic.com/s/i/materialicons/psychology/v1/24px.svg" type="image/svg+xml">

    <style>
        /* Reset básico */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #f3f6f9 0%, #dce4ec 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
        }

        /* Estilo do cartão central */
        .card {
            background-color: #ffffff;
            padding: 50px 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 420px;
            width: 90%;
            border: 1px solid rgba(255,255,255,0.3);
        }

        /* Container da Logo SVG */
        .logo-container {
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
        }

        .logo-svg {
            width: 100px;
            height: 100px;
        }

        h1 {
            font-size: 28px;
            color: #1a2a3a;
            margin-bottom: 12px;
            font-weight: 700;
        }

        p {
            font-size: 16px;
            color: #5a6a7a;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        /* Estilo do Botão */
        .btn {
            display: inline-block;
            background-color: #0056b3;
            color: #ffffff;
            text-decoration: none;
            padding: 16px 32px;
            font-size: 17px;
            font-weight: 600;
            border-radius: 12px;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(0, 86, 179, 0.25);
            width: 100%;
        }

        .btn:hover {
            background-color: #004494;
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 86, 179, 0.35);
        }

        .btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="logo-container">

</html>
