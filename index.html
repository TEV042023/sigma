<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PsiCorreção - Sistema Profissional</title>
    <meta name="description" content="Sistema de correção de testes psicológicos automatizado.">
    
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/3074/3074069.png" type="image/x-icon">

    <style>
        /* Remove margens e barras de rolagem da página 'casca' */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; /* Impede rolagem dupla */
            background-color: #f3f6f9;
        }

        /* O Iframe ocupa a tela toda */
        iframe {
            display: block;
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }
    </style>
</head>
<body>

    <iframe 
        src="COLE_SEU_LINK_DO_GOOGLE_AQUI" 
        allow="camera; microphone; forms; geolocation"
        title="App PsiCorreção">
    </iframe>

</body>
</html>
