<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sigma - Mapeamento de Perfil</title>
    <meta name="description" content="Sistema Sigma de Mapeamento de Perfil">
    
    <link rel="icon" href="https://fonts.gstatic.com/s/i/materialicons/psychology/v1/24px.svg" type="image/svg+xml">

    <style>
        /* Reset básico */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            /* Fundo com um gradiente suave e profissional */
            background: linear-gradient(135deg, #f3f6f9 0%, #dce4ec 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
        }

        /* Estilo do cartão central */
        .card {
            background-color: #ffffff;
            padding: 50px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        /* Logo do sistema */
        .logo {
            width: 90px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 26px;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        p {
            font-size: 16px;
            color: #6c7a89;
            margin-bottom: 35px;
            line-height: 1.5;
        }

        /* Estilo do Botão */
        .btn {
            display: inline-block;
            background-color: #0056b3; /* Azul corporativo */
            color: #ffffff;
            text-decoration: none;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 86, 179, 0.2);
            width: 100%;
        }

        /* Efeito ao passar o mouse no botão */
        .btn:hover {
            background-color: #004494;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 86, 179, 0.3);
        }

        /* Efeito ao clicar no botão */
        .btn:active {
            transform: translateY(1px);
            box-shadow: 0 2px 10px rgba(0, 86, 179, 0.2);
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="https://img.icons8.com/fluency/256/head-with-brain.png?v=1" alt="Logo Sigma" class="logo" style="width: 100px; height: 100px; margin-bottom: 25px;">
        
        <h1>Sistema Sigma</h1>
        <p>Bem-vindo ao sistema de mapeamento de perfil e avaliação comportamental.</p>
        
        <a href="https://script.google.com/macros/s/AKfycbyL2kx3-gv8Oxdg72SqsXIW6Nza4bDt9uKjOwh0IysL/exec?acao=infinical" target="_blank" class="btn">Iniciar Avaliação</a>
    </div>

</body>
</html>
